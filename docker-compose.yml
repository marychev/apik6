services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      CLICKHOUSE_HOST: clickhouse
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UVICORN_WORKERS: ${UVICORN_WORKERS:-5}
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_started
    restart: on-failure

  # ОТКЛЮЧЕНО в step_4: заменено на ClickHouse Kafka Engine (см. clickhouse_app/init_db.py)
  # consumer:
  #   build: .
  #   command: ["python", "-m", "kafka_app.user_consumer"]
  #   environment:
  #     CLICKHOUSE_HOST: clickhouse
  #     KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  #   depends_on:
  #     kafka:
  #       condition: service_healthy
  #     clickhouse:
  #       condition: service_started
  #   restart: on-failure

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-2}
      KAFKA_NUM_NETWORK_THREADS: 6
      KAFKA_NUM_IO_THREADS: 16
    ports:
      - "9092:9092"
      - "9093:9093"
    depends_on:
      - zookeeper
    #  Kafka проверяется через kafka-broker-api-versions — это встроенная утилита в образе Confluent, 
    # которая реально проверяет, что брокер отвечает. Consumer и API стартанут только после того, как Kafka станет healthy.
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "8123:8123"
      - "9000:9000"
